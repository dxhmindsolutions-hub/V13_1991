  if (!tiempoValor) return "";

  const ahora = new Date();
  let minutos = 0;

  if (tiempoValor.includes("h")) {

    const match = tiempoValor.match(/(\d+)h\s*(\d+)?/);

    if (match) {
      minutos += parseInt(match[1]) * 60;

      if (match[2]) {
        minutos += parseInt(match[2]);
      }
    }

  } else {

    minutos = parseInt(tiempoValor) || 0;

  });
};

  // ❌ NO se guarda cliente — solo se borra el pedido

  setPedidos(prev => {

  const generarNumeroTicket = () => {
  
    const ahora = new Date();
    const dia = String(ahora.getDate()).padStart(2, "0");
    const mes = String(ahora.getMonth() + 1).padStart(2, "0");
    const hora = String(ahora.getHours()).padStart(2, "0");
    const min = String(ahora.getMinutes()).padStart(2, "0");

    const fechaKey = `${dia}${mes}`;
    let data = JSON.parse(localStorage.getItem("ticketData")) || {};
    if (!data[fechaKey]) data[fechaKey] = 0;
    data[fechaKey]++;
    localStorage.setItem("ticketData", JSON.stringify(data));

    const numero = String(data[fechaKey]).padStart(5, "0");
    return `${fechaKey}-${hora}${min}-${numero}`;
  };

 const generarNumeroPedido = (tipo, preview = false) => {

  let contadores = JSON.parse(localStorage.getItem("contadoresPedidos")) || {
    llevar: 40,
    recoger: 70
  };

  if (tipo === "llevar") {

    const numero = contadores.llevar;

    if (!preview) {
      contadores.llevar++;

      localStorage.setItem(
        "contadoresPedidos",
        JSON.stringify(contadores)
      );
    }

    return `LLEVAR ${numero}`;
  }

  if (tipo === "recoger") {

    const numero = contadores.recoger;

    if (!preview) {
      contadores.recoger++;

      localStorage.setItem(
        "contadoresPedidos",
        JSON.stringify(contadores)
      );
    }

    return `RECOGER ${numero}`;
  }

  return "";
};

                        const nuevo = { ...prev };
                        if (clienteEditando.telefono !== c.telefono) delete nuevo[c.telefono];
                        nuevo[clienteEditando.telefono] = clienteEditando;
                        return nuevo;
                      });
                      setClienteEditando(null);
                    }} style={{ flex:1, background:"#16a34a", border:"none", color:"#fff", padding:"8px", borderRadius:"8px", fontWeight:"bold", cursor:"pointer", fontSize:"13px" }}>✅ Guardar</button>
                    <button onClick={() => setClienteEditando(null)} style={{ flex:1, background:"#1e2130", border:"1px solid #333", color:"#aaa", padding:"8px", borderRadius:"8px", cursor:"pointer", fontSize:"13px" }}>Cancelar</button>
                  </div>
                </div>
              ) : (
                // MODO VISTA
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"4px" }}>
                      <span style={{ color:"#a78bfa", fontWeight:"bold", fontSize:"15px" }}>📞 {c.telefono}</span>
                      {c.totalPedidos > 0 && (
                        <span style={{ background:"#1e2130", color:"#888", fontSize:"11px", padding:"2px 7px", borderRadius:"10px" }}>
                          {c.totalPedidos} pedido{c.totalPedidos !== 1 ? "s" : ""}
                        </span>
                      )}
                    </div>
                    {c.nombre && <div style={{ color:"#ddd", fontSize:"13px" }}>👤 {c.nombre}</div>}
                    {c.direccion && <div style={{ color:"#999", fontSize:"12px" }}>📍 {c.direccion}{c.zona ? ` · ${c.zona}` : ""}</div>}
                    {c.telefonoSecundario && <div style={{ color:"#888", fontSize:"12px" }}>📞 {c.telefonoSecundario}</div>}
                    {c.avisos && <div style={{ color:"#f59e0b", fontSize:"12px", fontWeight:"bold" }}>⚠️ {c.avisos}</div>}
                    {c.notasCliente && <div style={{ color:"#a78bfa", fontSize:"12px" }}>📝 {c.notasCliente}</div>}
                    <div style={{ display:"flex", gap:"8px", marginTop:"4px" }}>
                      {c.metodoPago && <span style={{ background: c.metodoPago==="EFECTIVO" ? "#14532d" : "#1e3a5f", color: c.metodoPago==="EFECTIVO" ? "#4ade80" : "#60a5fa", fontSize:"11px", padding:"2px 7px", borderRadius:"5px" }}>{c.metodoPago}</span>}
                      {c.ultimoPedido && <span style={{ color:"#444", fontSize:"11px" }}>Último: {c.ultimoPedido}</span>}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:"6px", marginLeft:"10px" }}>
                    <button onClick={() => setClienteEditando({...c})} style={{ background:"#1e2130", border:"1px solid #2a2f45", color:"#a78bfa", padding:"6px 10px", borderRadius:"8px", cursor:"pointer", fontSize:"13px" }}>✏️</button>
                    <button onClick={() => {
                      if (!confirm(`¿Eliminar a ${c.telefono}?`)) return;
                      setClientes(prev => { const n={...prev}; delete n[c.telefono]; return n; });
                    }} style={{ background:"#7f1d1d", border:"none", color:"#ef4444", padding:"6px 10px", borderRadius:"8px", cursor:"pointer", fontSize:"13px" }}>✕</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ====================
  // 🛠️ MODO GESTIÓN
  // ====================
  if (modoGestion) {
    const btnAccion = { background:"#1a1d2a", border:"1px solid #2a2f45", color:"#fff", padding:"10px 4px", borderRadius:"8px", fontWeight:"bold", fontSize:"12px", cursor:"pointer", textAlign:"center", flex:1 };
    return (
      <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#0f1117", color:"#fff", fontFamily:"system-ui,sans-serif" }}>

        {/* NAV */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", height:"56px", background:"#0f1117", borderBottom:"1px solid #1e2130", flexShrink:0 }}>
          <button onClick={()=>{ setModoGestion(false); setModoAjustes(true); }} style={{ background:"none", border:"none", color:"#a78bfa", fontSize:"14px", cursor:"pointer" }}>← Ajustes</button>
          <span style={{ fontWeight:"bold", fontSize:"16px" }}>🍜 Artículos</span>
          <button onClick={volverInicio} style={{ background:"none", border:"none", color:"#aaa", fontSize:"20px", cursor:"pointer" }}>🏠</button>
        </div>

        <div style={{ padding:"16px", maxWidth:"600px", margin:"0 auto", width:"100%", overflowY:"auto", flex:1 }}>

          {/* BUSCADOR */}
          <input placeholder="🔍 Buscar artículo..." value={busquedaGestion} onChange={e=>setBusquedaGestion(e.target.value)}
            style={{ width:"100%", boxSizing:"border-box", background:"#1a1d2a", border:"1px solid #2a2f45", color:"#fff", padding:"12px 14px", borderRadius:"10px", fontSize:"14px", marginBottom:"12px" }} />

          {/* BOTONES ACCIÓN */}
          <div style={{ display:"flex", gap:"6px", marginBottom:"16px" }}>
            <button onClick={exportarArticulos} style={btnAccion}>⬇️ Exportar</button>
            <label style={{...btnAccion, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>
              ⬆️ Importar
              <input type="file" accept="application/json" onChange={importarArticulos} style={{ display:"none" }} />
            </label>
            <button onClick={()=>{
              const ok = prompt("Escribe BORRAR para eliminar todos los artículos");
              if(ok==="BORRAR"){ localStorage.setItem("backup_articulos",JSON.stringify(articulos)); setArticulos({}); alert("Artículos borrados (backup guardado)"); }
            }} style={{...btnAccion, color:"#ef4444"}}>⚠️ Reset</button>
          </div>

          {/* FORMULARIO NUEVO / EDITAR */}
          <div style={{ background:"#141720", border:"1px solid #1e2130", borderRadius:"12px", padding:"16px", marginBottom:"16px", display:"flex", flexDirection:"column", gap:"8px" }}>
            <div style={{ fontWeight:"bold", fontSize:"14px", color:"#a78bfa", marginBottom:"4px" }}>{editando ? "✏️ Editando artículo" : "➕ Nuevo artículo"}</div>
            <input placeholder="Referencia" value={nuevo.ref} onChange={e=>setNuevo({...nuevo, ref:e.target.value})}
              style={{ background:"#1a1d2a", border:"1px solid #2a2f45", color:"#fff", padding:"9px 12px", borderRadius:"8px", fontSize:"14px" }} />
            <input placeholder="Nombre" value={nuevo.nombre} onChange={e=>setNuevo({...nuevo, nombre:e.target.value})}
              style={{ background:"#1a1d2a", border:"1px solid #2a2f45", color:"#fff", padding:"9px 12px", borderRadius:"8px", fontSize:"14px" }} />
            <input placeholder="Precio" value={nuevo.precio} onChange={e=>setNuevo({...nuevo, precio:e.target.value})}
              style={{ background:"#1a1d2a", border:"1px solid #2a2f45", color:"#fff", padding:"9px 12px", borderRadius:"8px", fontSize:"14px" }} />
            <select value={nuevo.categoria} onChange={e=>setNuevo({...nuevo, categoria:e.target.value})}
              style={{ background:"#1a1d2a", border:"1px solid #2a2f45", color:"#fff", padding:"9px 12px", borderRadius:"8px", fontSize:"14px" }}>
              <option value="">Categoría</option>
              {categorias.map(c=><option key={c}>{c}</option>)}
            </select>
            <button onClick={guardarArticulo} style={{ background: editando ? "#7c3aed" : "#16a34a", border:"none", color:"#fff", padding:"10px", borderRadius:"8px", fontWeight:"bold", fontSize:"14px", cursor:"pointer" }}>
              {editando ? "Actualizar" : "Guardar"}
            </button>
          </div>

          {/* CONTADOR */}
          <div style={{ color:"#555", fontSize:"12px", marginBottom:"10px" }}>Total: {Object.keys(articulos).length} artículos</div>

          {/* LISTA ARTÍCULOS */}
          <div style={{ background:"#141720", border:"1px solid #1e2130", borderRadius:"12px", overflow:"hidden", marginBottom:"20px" }}>
            {Object.entries(articulos)
              .sort((a,b) => { const nA=parseInt(a[0]), nB=parseInt(b[0]); return (!isNaN(nA)&&!isNaN(nB)) ? nA-nB : a[0].localeCompare(b[0]); })
              .filter(([ref,a]) => a.nombre.toLowerCase().includes(busquedaGestion.toLowerCase()) || ref.includes(busquedaGestion))
              .map(([ref,a], i, arr) => (
                <div key={ref} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", borderBottom: i<arr.length-1 ? "1px solid #1e2130" : "none" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                    <div style={{ background:"#1e2130", color:"#a78bfa", padding:"4px 8px", borderRadius:"6px", fontSize:"12px", fontWeight:"bold", minWidth:"38px", textAlign:"center" }}>{ref}</div>
                    <div>
                      <div style={{ color:"#fff", fontSize:"14px", fontWeight:"500" }}>{a.nombre}</div>
                      <div style={{ color:"#555", fontSize:"12px" }}>{a.precio}€</div>
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:"6px" }}>
                    <button onClick={()=>editarArticulo(ref)} style={{ background:"#1a1d2a", border:"1px solid #2a2f45", color:"#a78bfa", padding:"6px 10px", borderRadius:"8px", cursor:"pointer", fontSize:"13px" }}>✏️</button>
                    <button onClick={()=>{ if(confirm(`¿Eliminar ${a.nombre}?`)) eliminarArticulo(ref); }} style={{ background:"#7f1d1d", border:"none", color:"#ef4444", padding:"6px 10px", borderRadius:"8px", cursor:"pointer", fontSize:"13px" }}>✕</button>
                  </div>
                </div>
              ))}
          </div>

        </div>
      </div>
    );
  }

  // ====================
// 🛵 PANTALLA PEDIDOS (3 columnas)
// ====================
if (modoPedidos) {
  const ahora = new Date();
  const fechaHoy = ahora.toLocaleDateString("es-ES", { day:"2-digit", month:"2-digit", year:"numeric" });
  const horaAhora = ahora.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

  const todosPedidos = [
    ...Object.entries(pedidos.llevar).map(([id, p]) => ({ id, tipo:"llevar", ...p })),
    ...Object.entries(pedidos.recoger).map(([id, p]) => ({ id, tipo:"recoger", ...p }))
  ];

  // Pedido activo (el seleccionado en la columna izquierda)
  const pedidoActivo = pedidoSeleccionado
    ? (pedidoSeleccionado.tipo === "llevar" ? pedidos.llevar : pedidos.recoger)?.[pedidoSeleccionado.id]
    : null;

  const ticketActivo = pedidoActivo?.ticket || [];
  const totalActivo = ticketActivo.reduce((s, t) => s + t.precio * t.cantidad, 0);
  const articulosCount = ticketActivo.reduce((s, t) => s + t.cantidad, 0);

  const crearNuevoPedido = (tipo) => {
    const nuevoNumero = generarNumeroPedido(tipo);
    setTipoPedido(tipo);
    setPedidoNumero(nuevoNumero);
    setTicket([]);
    setComensales(""); setTelefono(""); setDireccion(""); setZona(""); setMetodoPago(""); setTiempo("");
    setAvisos(""); setNotasPedido("");
    setModoPedidos(false);
  };

  const abrirPedidoExistente = (tipo, id) => {
    setPedidoSeleccionado({ tipo, id });
  };

  const cerrarPedidoActivo = () => {
    if (!pedidoSeleccionado) return;
    const msg = "¿Cerrar y cobrar este pedido?";
    if (!confirm(msg)) return;
    const { tipo, id } = pedidoSeleccionado;
    const p = (tipo === "llevar" ? pedidos.llevar : pedidos.recoger)?.[id];

    // 💾 Guardar/actualizar cliente si hay teléfono
    if (p?.telefono && (tipo === "llevar" || tipo === "recoger")) {
      setClientes(prev => ({
        ...prev,
        [p.telefono]: {
          ...prev[p.telefono],
          telefono: p.telefono,
          telefonoSecundario: p.telefonoSecundario || prev[p.telefono]?.telefonoSecundario || "",
          nombre: tipo === "recoger" ? (p.direccion || prev[p.telefono]?.nombre || "") : (prev[p.telefono]?.nombre || ""),
          direccion: tipo === "llevar" ? (p.direccion || prev[p.telefono]?.direccion || "") : (prev[p.telefono]?.direccion || ""),
          zona: tipo === "llevar" ? (p.zona || prev[p.telefono]?.zona || "") : (prev[p.telefono]?.zona || ""),
          metodoPago: p.metodoPago || prev[p.telefono]?.metodoPago || "",
          avisos: p.avisos || prev[p.telefono]?.avisos || "",
          notasCliente: p.notasPedido || prev[p.telefono]?.notasCliente || "",
          ultimoPedido: new Date().toLocaleDateString("es-ES"),
          totalPedidos: (prev[p.telefono]?.totalPedidos || 0) + 1,
        }
      }));
    }

    // 🛵 Registrar entrega en pedidosEntregados si tiene repartidor
    if (p?.repartidor && tipo === "llevar") {
      const ticketP = p.ticket || [];
      const totalP = ticketP.reduce((s,t)=>s+(t.precio*t.cantidad),0);
      const horaAhora = new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
      setPedidosEntregados(prev => ({
        ...prev,
        [p.repartidor]: [
          ...(prev[p.repartidor] || []),
          { id, total: totalP, hora: horaAhora, direccion: p.direccion || "" }
        ]
      }));
    }

    setPedidos(prev => {
      const copia = { ...prev };
      copia[tipo] = { ...copia[tipo] };
      delete copia[tipo][id];
      return copia;
    });
    setPedidoSeleccionado(null);
  };

  const irAEditarPedido = () => {
    if (!pedidoSeleccionado) return;
    setTipoPedido(pedidoSeleccionado.tipo);
    setPedidoNumero(pedidoSeleccionado.id);
    setModoPedidos(false);
  };

  const irACocinaActivo = () => {
    if (!pedidoSeleccionado) return;
    setTipoPedido(pedidoSeleccionado.tipo);
    setPedidoNumero(pedidoSeleccionado.id);
    setModoPedidos(false);
    setModoCocina(true);
  };

  const irATicketActivo = () => {
    if (!pedidoSeleccionado) return;
    setTipoPedido(pedidoSeleccionado.tipo);
    setPedidoNumero(pedidoSeleccionado.id);
    setNumeroTicket(generarNumeroTicket());
    setModoPedidos(false);
    setModoTicket(true);
  };

  const horaEntregaActivo = pedidoActivo?.tiempo ? calcularHoraEntrega(pedidoActivo.tiempo) : "";
  const programadoFecha = pedidoActivo?.tiempo ? `${fechaHoy} - ${pedidoActivo?.horaCreacion || horaAhora}` : "";

  return (
    <div style={{
      display:"flex", flexDirection:"column", height:"100vh",
      background:"#0f1117", color:"#fff", fontFamily:"system-ui, sans-serif",
      overflow:"hidden"
    }}>

      {/* ── TOP NAV ── */}
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"0 20px", height:"56px", background:"#0f1117",
        borderBottom:"1px solid #1e2130", flexShrink:0
      }}>
        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
          <button onClick={()=>setModoPedidos(false)} style={{ background:"none", border:"none", color:"#aaa", fontSize:"20px", cursor:"pointer" }}>☰</button>
          <span style={{ fontWeight:"bold", fontSize:"16px" }}>Mini POS</span>
        </div>

        <div style={{ display:"flex", gap:"4px" }}>
          {[
            { label:"🧾 Pedidos", active:true, onClick:()=>{} },
            { label:"⊞ Mesas", active:false, onClick:()=>{ setModoPedidos(false); setModoMesas(true); } },
            
            { label:"⚙️ Ajustes", active:false, onClick:()=>{ setModoPedidos(false); setModoAjustes(true); } }
          ].map(btn => (
            <button key={btn.label} onClick={btn.onClick} style={{
              background: btn.active ? "transparent" : "transparent",
              border: "none", color: btn.active ? "#a78bfa" : "#888",
              fontWeight: btn.active ? "bold" : "normal",
              padding:"8px 14px", borderRadius:"8px", cursor:"pointer", fontSize:"14px",
              borderBottom: btn.active ? "2px solid #a78bfa" : "2px solid transparent"
            }}>{btn.label}</button>
          ))}
        </div>

        <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
          <span style={{ color:"#aaa", fontSize:"14px" }}>{horaAhora}</span>
          <button onClick={()=>setModoPedidos(false)} style={{ background:"none", border:"none", color:"#aaa", fontSize:"20px", cursor:"pointer" }}>🏠</button>
        </div>
      </div>

      {/* ── 3 COLUMNAS ── */}
      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        {/* ── COL 1: LISTA PEDIDOS (2 sub-columnas) ── */}
        <div style={{
          width:"420px", flexShrink:0, background:"#141720",
          borderRight:"1px solid #1e2130", display:"flex", flexDirection:"column",
          overflow:"hidden"
        }}>
          {/* Cabecera y botones */}
          <div style={{ padding:"16px 16px 8px", borderBottom:"1px solid #1e2130" }}>
            <div style={{ fontWeight:"bold", fontSize:"16px", marginBottom:"12px" }}>Pedidos creados</div>
            <div style={{ display:"flex", gap:"8px", marginBottom:"10px" }}>
              <button onClick={()=>crearNuevoPedido("llevar")} style={{
                flex:1, background:"#7c3aed", border:"none", color:"#fff",
                padding:"10px", borderRadius:"10px", fontWeight:"bold", cursor:"pointer", fontSize:"13px"
              }}>🛍 LLEVAR</button>
              <button onClick={()=>crearNuevoPedido("recoger")} style={{
                flex:1, background:"#ea6c00", border:"none", color:"#fff",
                padding:"10px", borderRadius:"10px", fontWeight:"bold", cursor:"pointer", fontSize:"13px"
              }}>🚶 RECOGER</button>
            </div>
          </div>

          {/* Dos sub-columnas */}
          <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

            {/* Sub-col LLEVAR */}
            <div style={{ flex:1, borderRight:"1px solid #1e2130", display:"flex", flexDirection:"column", overflow:"hidden" }}>
              <div style={{ padding:"8px 10px 6px", borderBottom:"1px solid #1e2130" }}>
                <span style={{ fontSize:"11px", fontWeight:"bold", color:"#a78bfa", letterSpacing:"1px" }}>🛍 LLEVAR</span>
                <span style={{ fontSize:"11px", color:"#555", marginLeft:"6px" }}>({Object.keys(pedidos.llevar).length})</span>
                <button onClick={()=>crearNuevoPedido("llevar")} style={{
                  float:"right", background:"none", border:"1px dashed #3a2f6a", color:"#7c3aed",
                  borderRadius:"6px", padding:"1px 7px", fontSize:"11px", cursor:"pointer"
                }}>+ nuevo</button>
              </div>
              <div style={{ overflowY:"auto", flex:1, padding:"6px 8px", display:"flex", flexDirection:"column", gap:"5px" }}>
                {Object.entries(pedidos.llevar).length === 0 && (
                  <div style={{ textAlign:"center", color:"#444", padding:"20px 0", fontSize:"12px" }}>Sin pedidos</div>
                )}
                {Object.entries(pedidos.llevar).map(([id, p]) => {
                  const isSelected = pedidoSeleccionado?.id === id && pedidoSeleccionado?.tipo === "llevar";
                  const subtotal = (p.ticket || []).reduce((s,t) => s+t.precio*t.cantidad, 0);
                  return (
                    <div key={id} onClick={() => abrirPedidoExistente("llevar", id)} style={{
                      background: isSelected ? "#1a1f35" : "#1a1d2a",
                      border: isSelected ? "1.5px solid #7c3aed" : "1.5px solid #1e2130",
                      borderRadius:"10px", padding:"10px 11px", cursor:"pointer", transition:"all 0.15s"
                    }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ fontSize:"13px", fontWeight:"bold", color:"#a78bfa" }}>
                          {id.replace(/^LLEVAR\s*/, "")}
                        </span>
                        <span style={{ color:"#888", fontSize:"11px" }}>{p.horaCreacion || horaAhora}</span>
                      </div>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"4px" }}>
                        <span style={{ color:"#ccc", fontSize:"11px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"80px" }}>
                          {p.telefono || p.direccion || "—"}
                        </span>
                        <span style={{ fontWeight:"bold", fontSize:"12px" }}>{subtotal.toFixed(2)}€</span>
                      </div>
                      {p.repartidor && (
                        <div style={{ marginTop:"4px" }}>
                          <span style={{ background:"#1d4ed8", color:"#fff", fontSize:"10px", padding:"2px 6px", borderRadius:"4px", fontWeight:"bold" }}>
                            🛵 {p.repartidor}
                          </span>
                        </div>
                      )}
                      {p.metodoPago && (
                        <div style={{ marginTop:"4px" }}>
                          <span style={{
                            background: p.metodoPago === "EFECTIVO" ? "#16a34a" : "#1d4ed8",
                            color:"#fff", fontSize:"10px", padding:"2px 6px", borderRadius:"4px", fontWeight:"bold"
                          }}>{p.metodoPago}</span>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Sub-col RECOGER */}
            <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
              <div style={{ padding:"8px 10px 6px", borderBottom:"1px solid #1e2130" }}>
                <span style={{ fontSize:"11px", fontWeight:"bold", color:"#fb923c", letterSpacing:"1px" }}>🚶 RECOGER</span>
                <span style={{ fontSize:"11px", color:"#555", marginLeft:"6px" }}>({Object.keys(pedidos.recoger).length})</span>
                <button onClick={()=>crearNuevoPedido("recoger")} style={{
                  float:"right", background:"none", border:"1px dashed #6a3500", color:"#ea6c00",
                  borderRadius:"6px", padding:"1px 7px", fontSize:"11px", cursor:"pointer"
                }}>+ nuevo</button>
              </div>
              <div style={{ overflowY:"auto", flex:1, padding:"6px 8px", display:"flex", flexDirection:"column", gap:"5px" }}>
                {Object.entries(pedidos.recoger).length === 0 && (
                  <div style={{ textAlign:"center", color:"#444", padding:"20px 0", fontSize:"12px" }}>Sin pedidos</div>
                )}
                {Object.entries(pedidos.recoger).map(([id, p]) => {
                  const isSelected = pedidoSeleccionado?.id === id && pedidoSeleccionado?.tipo === "recoger";
                  const subtotal = (p.ticket || []).reduce((s,t) => s+t.precio*t.cantidad, 0);
                  return (
                    <div key={id} onClick={() => abrirPedidoExistente("recoger", id)} style={{
                      background: isSelected ? "#251800" : "#1a1d2a",
                      border: isSelected ? "1.5px solid #ea6c00" : "1.5px solid #1e2130",
                      borderRadius:"10px", padding:"10px 11px", cursor:"pointer", transition:"all 0.15s"
                    }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ fontSize:"13px", fontWeight:"bold", color:"#fb923c" }}>
                          {id.replace(/^RECOGER\s*/, "")}
                        </span>
                        <span style={{ color:"#888", fontSize:"11px" }}>{p.horaCreacion || horaAhora}</span>
                      </div>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"4px" }}>
                        <span style={{ color:"#ccc", fontSize:"11px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"80px" }}>
                          {p.telefono || p.direccion || "—"}
                        </span>
                        <span style={{ fontWeight:"bold", fontSize:"12px" }}>{subtotal.toFixed(2)}€</span>
                      </div>
                      {p.metodoPago && (
                        <div style={{ marginTop:"4px" }}>
                          <span style={{
                            background: p.metodoPago === "EFECTIVO" ? "#16a34a" : "#1d4ed8",

                          }}>{p.metodoPago}</span>

            </div>

          </div>
        </div>

        {/* ── COL 2: DETALLE PEDIDO ── */}
        <div style={{
          flex:1, background:"#141720", borderRight:"1px solid #1e2130",
          display:"flex", flexDirection:"column", overflow:"hidden"
        }}>
          {!pedidoSeleccionado ? (
            <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", color:"#444", fontSize:"15px" }}>
              Selecciona un pedido
            </div>
          ) : (
            <>
              {/* HEADER DEL PEDIDO */}
              <div style={{
                padding:"16px 20px", borderBottom:"1px solid #1e2130",
                display:"flex", justifyContent:"space-between", alignItems:"flex-start"
              }}>
                <div>
                  <div style={{ fontSize:"18px", fontWeight:"bold" }}>
                    <span style={{ color: pedidoSeleccionado.tipo === "llevar" ? "#a78bfa" : "#fb923c" }}>
                      {pedidoSeleccionado.id}
                    </span>
                    {pedidoActivo?.telefono && (
                      <span style={{ color:"#aaa", fontWeight:"normal", fontSize:"16px" }}>
                        {" "}– {pedidoActivo.telefono}
                      </span>
                    )}
                  </div>
                  <div style={{ color:"#666", fontSize:"13px", marginTop:"2px" }}>
                    Creado a las {pedidoActivo?.horaCreacion || horaAhora}
                  </div>
                </div>
                <button onClick={irACocinaActivo} style={{
                  background:"#1e2130", border:"1px solid #333", color:"#fff",
                  padding:"8px 16px", borderRadius:"8px", cursor:"pointer", fontSize:"13px",
                  display:"flex", alignItems:"center", gap:"6px"
                }}>🍳 Cocina</button>
              </div>

                <div style={{ fontWeight:"bold", fontSize:"15px", padding:"14px 0 8px" }}>Detalles del pedido</div>

                  {ticketActivo.length === 0 && (
                    <div style={{ textAlign:"center", color:"#555", padding:"24px", fontSize:"13px" }}>
                      Sin artículos
                    </div>
                  )}
                  {ticketActivo.filter(t => !t.esHijoMenu).map((t, i) => (
                    <div key={i} style={{
                      display:"flex", justifyContent:"space-between", alignItems:"center",
                      padding:"14px 16px", borderBottom:"1px solid #1e2130"

                        <span style={{ color:"#888", minWidth:"20px" }}>{t.cantidad}</span>
                        <div>
                          <div style={{ fontSize:"14px" }}>{t.nombre}</div>
                          {t.nota && <div style={{ color:"#888", fontSize:"12px" }}>{t.nota}</div>}
                          {(t.gluten||t.verdura||t.carne||t.huevo||t.marisco||t.frutossecos) && (
                            <div style={{ color:"#f59e0b", fontSize:"11px" }}>
                              {[t.gluten&&"SIN GLUTEN",t.verdura&&"NO VERDURA",t.carne&&"NO CARNE",t.huevo&&"NO HUEVO",t.marisco&&"ALERGIA MARISCO",t.frutossecos&&"ALERGIA F.SECOS"].filter(Boolean).join(" / ")}
                            </div>
                          )}
                        </div>
                      </div>
                      <span style={{ fontWeight:"bold", fontSize:"14px" }}>{(t.precio*t.cantidad).toFixed(2)} €</span>
                    </div>

                {/* TOTAL */}
                <div style={{
                  display:"flex", justifyContent:"space-between", alignItems:"center",
                  padding:"16px 0", borderTop:"1px solid #1e2130", marginTop:"8px"

                    <span style={{ fontWeight:"bold", fontSize:"16px" }}>Total</span>

                      background:"#1e2130", color:"#aaa", fontSize:"12px",
                      padding:"3px 10px", borderRadius:"20px"

                  </div>
                  <span style={{ fontWeight:"bold", fontSize:"22px" }}>{totalActivo.toFixed(2)} €</span>
                </div>
              </div>

                  border:"none", color:"#fff", padding:"14px", borderRadius:"12px",
                  fontWeight:"bold", fontSize:"16px", cursor:"pointer",
                  display:"flex", alignItems:"center", justifyContent:"center", gap:"8px"
                }}>💳 Cobrar</button>
                <div style={{ display:"flex", gap:"8px" }}>
                  <button onClick={irACocinaActivo} style={{
                    flex:1, background:"linear-gradient(135deg,#ea580c,#c2410c)",
                    border:"none", color:"#fff", padding:"12px", borderRadius:"12px",
                    fontWeight:"bold", fontSize:"14px", cursor:"pointer"
                  }}>🍳 Comandar</button>
                  <button onClick={irATicketActivo} style={{
                    flex:1, background:"linear-gradient(135deg,#ca8a04,#a16207)",
                    border:"none", color:"#fff", padding:"12px", borderRadius:"12px",
                    fontWeight:"bold", fontSize:"14px", cursor:"pointer"
                  }}>🧾 Ticket</button>
                </div>
              </div>
            </>
          )}
        </div>

        {/* ── COL 3: INFO PEDIDO + CLIENTE ── */}

          width:"280px", flexShrink:0, background:"#141720",

        }}>
          {!pedidoSeleccionado ? (

            </div>
          ) : (
            <>
              {/* INFO PEDIDO */}

                <span style={{ fontWeight:"bold", fontSize:"15px" }}>Información del pedido</span>
                <button onClick={irAEditarPedido} style={{ background:"none", border:"none", color:"#a78bfa", fontSize:"18px", cursor:"pointer" }}>✏️</button>
              </div>

              {pedidoActivo?.tiempo && (
                <div style={{ marginBottom:"12px" }}>
                  <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Programado</div>
                  <div style={{ color:"#ddd", fontSize:"13px" }}>{programadoFecha}</div>
                </div>
              )}

              {horaEntregaActivo && (
                <div style={{ marginBottom:"12px" }}>
                  <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>
                    {pedidoSeleccionado?.tipo === "llevar" ? "🛵 Hora de entrega" : "🚶 Hora de recogida"}
                  </div>
                  <div style={{ color:"#ddd", fontSize:"13px" }}>{horaEntregaActivo}</div>
                </div>
              )}

              {pedidoActivo?.tiempo && (
                <div style={{ marginBottom:"12px" }}>
                  <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Tiempo estimado</div>
                  <div style={{ color:"#ddd", fontSize:"13px" }}>{pedidoActivo.tiempo}</div>
                </div>
              )}

              {(pedidoActivo?.direccion || pedidoActivo?.zona) && (
                <div style={{ marginBottom:"16px" }}>
                  <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>
                    {pedidoSeleccionado?.tipo === "recoger" ? "Nombre" : "Dirección"}
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div style={{ color:"#ddd", fontSize:"13px", flex:1 }}>
                      {pedidoActivo.direccion}{pedidoSeleccionado?.tipo !== "recoger" && pedidoActivo.zona ? ` – ${pedidoActivo.zona}` : ""}
                    </div>
                    <span style={{ color:"#a78bfa", fontSize:"16px", marginLeft:"8px" }}>
                      {pedidoSeleccionado?.tipo === "recoger" ? "👤" : "📍"}
                    </span>
                  </div>
                </div>
              )}

              <div style={{ borderTop:"1px solid #1e2130", paddingTop:"16px", marginBottom:"14px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"14px" }}>
                  <span style={{ fontWeight:"bold", fontSize:"15px" }}>Información del cliente</span>
                  <span style={{ color:"#a78bfa", fontSize:"18px" }}>👤</span>
                </div>

                {pedidoActivo?.telefono && (
                  <>
                    {pedidoSeleccionado?.tipo === "recoger" && pedidoActivo?.direccion && (
                      <div style={{ marginBottom:"10px" }}>
                        <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Nombre del cliente</div>
                        <div style={{ color:"#ddd", fontSize:"13px" }}>{pedidoActivo.direccion}</div>
                      </div>
                    )}
                    <div style={{ marginBottom:"12px" }}>
                      <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Teléfono del cliente</div>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ color:"#ddd", fontSize:"13px" }}>{pedidoActivo.telefono}</span>
                        <span style={{ color:"#a78bfa", fontSize:"16px" }}>📞</span>
                      </div>
                    </div>
                  </>
                )}

                {pedidoActivo?.metodoPago && (
                  <div style={{ marginBottom:"16px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                        <span style={{ color:"#a78bfa", fontSize:"16px" }}>💳</span>
                        <span style={{ color:"#ddd", fontSize:"13px" }}>Método de pago</span>
                      </div>
                      <span style={{
                        background: pedidoActivo.metodoPago === "EFECTIVO" ? "#16a34a" : "#1d4ed8",
                        color:"#fff", fontSize:"11px", padding:"3px 9px",
                        borderRadius:"5px", fontWeight:"bold"
                      }}>{pedidoActivo.metodoPago}</span>
                    </div>
                  </div>
                )}
                {pedidoActivo?.avisos && (
                  <div style={{ marginBottom:"10px", background:"#292200", border:"1px solid #f59e0b", borderRadius:"8px", padding:"8px 10px" }}>
                    <span style={{ color:"#f59e0b", fontSize:"13px", fontWeight:"bold" }}>⚠️ {pedidoActivo.avisos}</span>
                  </div>
                )}
                {pedidoActivo?.notasPedido && (
                  <div style={{ marginBottom:"10px", background:"#1a1535", border:"1px solid #7c3aed", borderRadius:"8px", padding:"8px 10px" }}>
                    <span style={{ color:"#a78bfa", fontSize:"13px" }}>📝 {pedidoActivo.notasPedido}</span>
                  </div>
                )}
              </div>

              {/* ASIGNAR REPARTIDOR — solo para llevar */}
              {pedidoSeleccionado?.tipo === "llevar" && (
                <div style={{ marginBottom:"16px", borderTop:"1px solid #1e2130", paddingTop:"16px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
                    <span style={{ fontWeight:"bold", fontSize:"15px" }}>🛵 Repartidor</span>
                    {pedidoActivo?.repartidor && (
                      <span style={{ background:"#1d4ed8", color:"#fff", fontSize:"11px", padding:"3px 9px", borderRadius:"5px", fontWeight:"bold" }}>
                        {pedidoActivo.repartidor}
                      </span>
                    )}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                    {repartidores.map(rep => (
                      <button key={rep} onClick={() => {
                        const { tipo, id } = pedidoSeleccionado;
                        setPedidos(prev => ({
                          ...prev,
                          [tipo]: {
                            ...prev[tipo],
                            [id]: { ...prev[tipo][id], repartidor: pedidoActivo?.repartidor === rep ? "" : rep }
                          }
                        }));
                      }} style={{
                        background: pedidoActivo?.repartidor === rep ? "#1d4ed8" : "#1a1d2a",
                        border: pedidoActivo?.repartidor === rep ? "1.5px solid #3b82f6" : "1.5px solid #2a2f45",
                        color: pedidoActivo?.repartidor === rep ? "#fff" : "#aaa",
                        padding:"9px 12px", borderRadius:"8px", cursor:"pointer",
                        fontWeight:"bold", fontSize:"13px", textAlign:"left",
                        display:"flex", alignItems:"center", gap:"8px"
                      }}>
                        <span>{pedidoActivo?.repartidor === rep ? "✅" : "🛵"}</span>
                        <span>{rep}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* CANCELAR */}
              <button onClick={cerrarPedidoActivo} style={{
                width:"100%", background:"linear-gradient(135deg,#16a34a,#15803d)",
                border:"none", color:"#fff",
                padding:"12px", borderRadius:"10px", fontWeight:"bold",
                fontSize:"14px", cursor:"pointer",
                display:"flex", alignItems:"center", justifyContent:"center", gap:"8px"
              }}>✅ Cerrar pedido</button>
            </>
          )}
        </div>

      </div>
    </div>
  );
}

if (modoMesas) {

      }}>
        <span style={{ fontSize: circle?"17px":"14px", fontWeight:"700", color: ok?"#fff":"#c8d0e8", letterSpacing:"0.5px" }}>{n}</span>
        <span style={{ fontSize:"9px", color: ok?"#fed7aa":"#3d4a6b", marginTop:"2px", letterSpacing:"0.5px" }}>{ok?"Ocupada":"Libre"}</span>
      </div>

      <div onClick={() => abrirMesa(n)} style={{
        width:w, height:h, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center",
        cursor:"pointer", background: ok ? "linear-gradient(145deg,#f97316,#ea580c)" : "#1c2035",
        border: ok ? "1.5px solid #fb923c" : "1.5px solid #2a3050",
        borderRadius:"8px", userSelect:"none", flexShrink:0,

        <span style={{ fontSize:"12px", fontWeight:"600", color: ok?"#fff":"#c8d0e8" }}>{n}</span>
        <span style={{ fontSize:"8px", color: ok?"#fed7aa":"#3d4a6b", marginTop:"1px" }}>{ok?"Ocp":"—"}</span>
      </div>
    );
  };

    <div style={{
      width: vertical ? 3 : w, height: vertical ? 80 : 3,
      background:"#2a3050", borderRadius:2,
      flexShrink:0, alignSelf:"center"

  // ── Etiqueta de zona ──

      <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
        <button onClick={()=>setModoMesas(false)} style={{ background:"none", border:"none", color:"#aaa", fontSize:"20px", cursor:"pointer" }}>☰</button>
        <span style={{ fontWeight:"bold", fontSize:"16px", color:"#fff" }}>Mini POS</span>

        {[

        ].map(btn => (
          <button key={btn.label} onClick={btn.onClick} style={{
            background:"transparent", border:"none",
            color: btn.active ? "#a78bfa" : "#888",

            padding:"8px 14px", borderRadius:"8px", cursor:"pointer", fontSize:"14px",

              <div style={{

        {/* ════ SALA INTERIOR ════ */}
        {tabActivo === "interior" && (
          <div style={{ background:"#0d1020", border:"1px solid #1a2040", borderRadius:"16px", padding:"16px 20px", display:"inline-flex", flexDirection:"column" }}>

            </div>

            {/* 2 columnas */}
            <div style={{ display:"flex", gap:"48px", alignItems:"flex-start" }}>

              {/* ── ZONA A: 21, [espacio], 22(aux), 23(aux), [espacio], fila[24 + 124] ── */}
              <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
                {M(21, false, 80, 60)}
                <div style={{ height:"6px" }} />
                {A(22, 80, 44)}
                {A(23, 80, 44)}
                <div style={{ height:"6px" }} />
                <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                  {M(24, false, 68, 54)}
                  {A(124, 44, 54)}
                </div>
              </div>

              {/* ── ZONA B: [125+25], [espacio], [126+26], [espacio grande], 27 ── */}
              <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
                <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                  {A(125, 44, 52)}
                  {M(25, false, 80, 52)}
                </div>
                <div style={{ height:"6px" }} />
                <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                  {A(126, 44, 52)}
                  {M(26, false, 80, 52)}
                </div>
                <div style={{ height:"20px" }} />
                {/* 27 alineado a la derecha */}
                <div style={{ display:"flex", justifyContent:"flex-end" }}>
                  {M(27, false, 80, 64)}
                </div>
              </div>

            </div>
          </div>
        )}

      </div>
    </div>
  );
}

      <div style={{ display:"flex", gap:"8px", marginTop:"16px" }}>
        <button onClick={()=>{
          const texto=[checksTemp.aceite&&"ACEITE",checksTemp.gluten&&"SIN GLUTEN",checksTemp.verdura&&"NO VERDURA",checksTemp.carne&&"NO CARNE",checksTemp.huevo&&"NO HUEVO",checksTemp.marisco&&"ALERGIA MARISCO",checksTemp.frutossecos&&"ALERGIA FRUTOS SECOS",notaTemp].filter(Boolean).join("\n");
          guardarPedido(ticket.map(t=>t.ref===subMenuEditando.menuRef&&t.esMenuPadre?{...t,mods:{...t.mods,[subMenuEditando.subRef]:texto.toUpperCase()}}:t));
          setSubMenuEditando(null);
        }} style={{ flex:1, ...darkBtn("#16a34a") }}>GUARDAR</button>
        <button onClick={()=>setSubMenuEditando(null)} style={{ flex:1, ...darkBtn("#1a1d2a","#aaa"), border:"1px solid #2a2f45" }}>CANCELAR</button>
      </div>
    </div>
  </div>
)}

  </div>
  {/* FIN COLUMNA IZQUIERDA */}
  </div>

  {/* COLUMNA DERECHA — Pedido actual */}
  {(tipoPedido === "llevar" || tipoPedido === "recoger" || tipoPedido === "comer") && ticket.length > 0 && (
    <div style={{
      width:"260px", flexShrink:0, background:"#141720", borderLeft:"1px solid #1e2130",
      padding:"16px", overflowY:"auto", display:"flex", flexDirection:"column", gap:"8px"
    }}>
      <div style={{ fontWeight:"bold", fontSize:"14px", color:"#a78bfa", marginBottom:"4px" }}>
        Pedido actual
      </div>
      <div style={{ fontSize:"12px", color:"#666", marginBottom:"8px" }}>
        {ticket.reduce((s,t)=>s+t.cantidad,0)} ítem{ticket.reduce((s,t)=>s+t.cantidad,0)!==1?"s":""}
      </div>
      {ticket.map((t,i) => (
        <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", borderBottom:"1px solid #1e2130", paddingBottom:"6px", marginBottom:"2px" }}>
          <div style={{ flex:1 }}>
            <span style={{ color:"#ddd", fontSize:"13px", fontWeight:"bold" }}>{t.cantidad} × {t.ref}</span>
            <div style={{ color:"#555", fontSize:"11px" }}>{t.nombre}</div>
            {(t.nota||t.aceite||t.gluten||t.verdura||t.carne||t.huevo||t.marisco||t.frutossecos) && (
              <div style={{ color:"#f59e0b", fontSize:"10px", marginTop:"1px" }}>
                {[t.verdura&&"NO VER",t.carne&&"NO CARNE",t.gluten&&"SIN GLUTEN",t.aceite&&"ACEITE",t.huevo&&"NO HUEVO",t.marisco&&"ALERGIA MAR",t.frutossecos&&"ALERGIA F.S",t.nota].filter(Boolean).join(" / ")}
              </div>
            )}
          </div>
          <span style={{ color:"#fff", fontSize:"13px", fontWeight:"bold", marginLeft:"8px", fontFamily:"monospace" }}>{(t.precio*t.cantidad).toFixed(2)}€</span>
        </div>
      ))}
      <div style={{ display:"flex", justifyContent:"space-between", borderTop:"2px solid #2a2f45", paddingTop:"10px", fontWeight:"bold", fontSize:"16px" }}>
        <span style={{ color:"#aaa" }}>Total</span>
        <span style={{ color:"#fff" }}>{total.toFixed(2)}€</span>
      </div>
      {(tipoPedido === "llevar" || tipoPedido === "recoger") && (
        <div style={{ marginTop:"4px", display:"flex", flexDirection:"column", gap:"4px" }}>
          {direccion && <div style={{ color:"#999", fontSize:"12px" }}>📍 {direccion}{zona ? ` · ${zona}` : ""}</div>}
          {telefono && <div style={{ color:"#a78bfa", fontSize:"12px" }}>📞 {telefono}</div>}
          {avisos && <div style={{ color:"#f59e0b", fontSize:"12px", fontWeight:"bold" }}>⚠️ {avisos}</div>}
          {notasPedido && <div style={{ color:"#a78bfa", fontSize:"12px" }}>📝 {notasPedido}</div>}
          {metodoPago && <div style={{ color: metodoPago==="EFECTIVO" ? "#4ade80" : "#60a5fa", fontSize:"12px", fontWeight:"bold" }}>{metodoPago==="EFECTIVO"?"💵":"💳"} {metodoPago}</div>}
          {tiempo && <div style={{ color:"#888", fontSize:"12px" }}>⏱ {tiempo} → {calcularHoraEntrega(tiempo)}</div>}
        </div>
      )}
    </div>
  )}

  </div>
  </div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<POSApp />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("./sw.js")
      .then(reg => console.log("Service Worker registrado", reg))
      .catch(err => console.log("Error registrando SW", err));
  });
}

      </script>
</body>
</html>
